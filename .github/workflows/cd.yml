
# =============================================================================
# cd.yml
# Pipeline de CD para la app móvil yt-mp3-apk.
# Dos jobs separados:
# 1. update: actualización OTA automática en cada merge a main (JS changes)
# 2. build:  compilación de APK manual cuando hay cambios nativos
# =============================================================================

name: CD

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      job:
        description: 'Job a ejecutar'
        required: true
        default: 'update'
        type: choice
        options:
          - update
          - build

jobs:
  # ---------------------------------------------------------------------------
  # JOB 1: Actualización OTA automática
  # Se ejecuta en cada merge a main
  # El usuario recibe la actualización sin reinstalar la app
  # ---------------------------------------------------------------------------
  update:
    name: EAS Update (OTA)
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event.inputs.job == 'update'

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Instalar dependencias
        run: npm install

      - name: Publicar actualización OTA
        run: eas update --auto --non-interactive
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
          EXPO_PUBLIC_API_URL: ${{ secrets.EXPO_PUBLIC_API_URL }}

  # ---------------------------------------------------------------------------
  # JOB 2: Compilación de APK
  # Solo se ejecuta manualmente cuando hay cambios nativos
  # ---------------------------------------------------------------------------
  build:
    name: EAS Build (APK)
    runs-on: ubuntu-latest
    if: github.event.inputs.job == 'build'

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Instalar dependencias
        run: npm install

      - name: Instalar EAS CLI
        run: npm install -g eas-cli

      - name: Compilar APK preview
        run: eas build --platform android --profile preview --non-interactive
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
          EXPO_PUBLIC_API_URL: ${{ secrets.EXPO_PUBLIC_API_URL }}
